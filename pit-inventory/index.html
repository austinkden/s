<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pit Inventory</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <script src="https://unpkg.com/nbt@0.8.1/nbt.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <div class="input-choice-container">
            <button id="type-choice-api" class="selected">API Key + IGN</button>
            <button id="type-choice-upload">Upload JSON</button>
            <button id="type-choice-paste">Paste JSON</button>
        </div>

        <div class="input-type-container type-choice-api">
            <div class="api-key">
                <div class="input">
                    <i data-lucide="key-square"></i>
                    <input type="password" id="api-key" autocomplete="off" placeholder="Hypixel API Key...">
                </div>
            </div>
            <div class="api-key-options">
                <p><span id="api-go-to-portal">CLICK HERE</span> to get an API key!</p>
                <p>Show API key? <span id="api-show-true">YES</span> / <span id="api-show-false" class="selected">NO</span></p>
                <p>Save API key for future use? <span id="api-save-true">YES</span> / <span id="api-save-false" class="selected">NO</span></p>
            </div>
            <div class="username">
                <div class="input">
                    <i data-lucide="user"></i>
                    <input type="text" id="username" autocomplete="off" placeholder="Username...">
                </div>
                <button id="api-key-ign-next" class="next not-allowed"><i data-lucide="arrow-right"></i></button>
            </div>
        </div>

        <div class="input-type-container type-choice-upload">
            <div class="input">
                <i data-lucide="upload"></i>
                <input type="file" id="upload" accept=".json">
            </div>
        </div>

        <div class="input-type-container type-choice-paste">
            <div class="input">
                <i data-lucide="clipboard"></i>
                <textarea id="paste" placeholder='{"success":true,"player":{...}}'></textarea>
            </div>
        </div>

        <div class="textareas">
            <h2>Armor:</h2>
            <textarea id="armor" class="textarea"></textarea>
            <h2>Inventory:</h2>
            <textarea id="inv" class="textarea"></textarea>
            <h2>Ender Chest:</h2>
            <textarea id="ec" class="textarea"></textarea>
            <h2>Stash:</h2>
            <textarea id="stash" class="textarea"></textarea>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="script.js"></script>
</body>
</html>
